<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de QI Officiel 2026</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; max-width: 400px; width: 90%; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .logo { width: 60px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: #0f172a; }
        .subtitle { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        .timer-box { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 24px; }
        .timer { font-size: 32px; font-weight: bold; color: #2563eb; font-variant-numeric: tabular-nums; }
        .features { text-align: left; margin-bottom: 30px; font-size: 15px; line-height: 1.6; }
        .btn-container { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s; color: white; }
        .btn-male { background: #2563eb; }
        .btn-female { background: #db2777; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" class="logo">
        <h1>Évaluation Cognitive</h1>
        <p class="subtitle">Session certifiée 2026</p>
        <div class="timer-box">
            <div class="timer" id="timer">03:00</div>
        </div>
        <div class="features">
            <div>✓ Analyse de logique pure</div>
            <div>✓ Temps de réponse chronométré</div>
            <div>✓ Rapport PDF certifié (1€)</div>
        </div>
        <p style="font-size: 14px; margin-bottom: 15px;">Sélectionnez votre profil :</p>
        <div class="btn-container">
            <button class="btn btn-male" onclick="start()">HOMME ♂️</button>
            <button class="btn btn-female" onclick="start()">FEMME ♀️</button>
        </div>
    </div>
    <script>
        let timeLeft = 180;
        const timerElement = document.getElementById('timer');
        setInterval(() => {
            if (timeLeft <= 0) return;
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerElement.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }, 1000);
        function start() {
            window.location.href = "https://beacons.ai/nicomarketingpro"; 
        }
    </script>
</body>
</html>
