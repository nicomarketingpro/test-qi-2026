<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de QI Officiel 2026</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; max-width: 450px; width: 90%; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .logo { width: 50px; margin-bottom: 15px; }
        h1 { font-size: 22px; margin-bottom: 10px; color: #0f172a; }
        .timer-box { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; color: #2563eb; }
        
        /* Quiz Styles */
        #quiz-container { display: none; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; min-height: 60px; }
        .options { display: grid; gap: 10px; }
        .option-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option-btn:hover { border-color: #2563eb; background: #f8fafc; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2563eb; width: 0%; transition: 0.3s; }
        
        /* Loading Styles */
        #loading-screen { display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-main { background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="home-screen">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" class="logo">
        <h1>Évaluation Cognitive</h1>
        <div class="timer-box">Session 2026 - Temps limité : 03:00</div>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Analyse de logique, mémoire et raisonnement spatial.</p>
        <button class="btn-main" onclick="startQuiz()">COMMENCER LE TEST</button>
    </div>

    <div id="quiz-container">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="question-text" id="question">Chargement...</div>
        <div class="options" id="options"></div>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h3>Analyse des réponses...</h3>
        <p style="color: #64748b; font-size: 14px;">Calcul de votre rang percentile par rapport à la population française.</p>
    </div>
</div>

<script>
    const questions = [
        { q: "Quelle forme suit logiquement : Cercle, Carré, Pentagone, ... ?", a: ["Hexagone", "Triangle", "Ligne", "Cube"], correct: 0 },
        { q: "Si 2+2=4 et 4+4=8, combien font 8+8 ?", a: ["12", "16", "24", "32"], correct: 1 },
        { q: "Complétez la suite : 2, 4, 8, 16, ...", a: ["24", "30", "32", "64"], correct: 2 },
        { q: "Le frère de ma sœur est le fils de mon père. Qui est-il pour moi ?", a: ["Mon oncle", "Mon cousin", "Mon frère", "Moi-même"], correct: 2 },
        { q: "Quelle ville est l'intrus ?", a: ["Paris", "Lyon", "Berlin", "Marseille"], correct: 2 }
    ];

    let currentQ = 0;

    function startQuiz() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => nextQuestion();
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        
        // Simulation de calcul pendant 3 secondes
        setTimeout(() => {
            // METS TON LIEN BEACONS ICI :
            window.location.href = "https://beacons.ai/TON_NOM_BEACONS";
        }, 3500);
    }
</script>

</body>
</html>
