<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de QI Officiel 2026</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; max-width: 450px; width: 90%; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .logo { width: 50px; margin-bottom: 15px; }
        h1 { font-size: 22px; margin-bottom: 10px; color: #0f172a; }
        .timer-box { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; color: #2563eb; font-size: 1.2rem; }
        
        #quiz-container, #loading-screen { display: none; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; min-height: 60px; }
        .options { display: grid; gap: 10px; }
        .option-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 16px; }
        .option-btn:hover { border-color: #2563eb; background: #f8fafc; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2563eb; width: 0%; transition: 0.3s; }
        
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-main { background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; font-size: 18px; }
        #mute-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>

<div class="card">
    <button id="mute-btn" onclick="toggleMute()">🔊</button>
    <div class="timer-box" id="global-timer">Temps restant : 03:00</div>

    <div id="home-screen">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" class="logo">
        <h1>Évaluation Cognitive</h1>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Analyse de logique en temps réel.<br>Veuillez activer le son pour l'immersion.</p>
        <button class="btn-main" onclick="startQuiz()">COMMENCER LE TEST</button>
    </div>

    <div id="quiz-container">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="question-text" id="question">Chargement...</div>
        <div class="options" id="options"></div>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h3>Analyse terminée !</h3>
        <p style="color: #64748b; font-size: 14px;">Nous préparons l'accès à vos résultats sécurisés...</p>
    </div>
</div>

<script>
    let timeLeft = 180;
    let timerId;
    let music = document.getElementById('bg-music');
    
    const questions = [
        { q: "Quelle forme suit logiquement : Cercle, Carré, Pentagone, ... ?", a: ["Hexagone", "Triangle", "Ligne", "Cube"] },
        { q: "Si 2+2=4 et 4+4=8, combien font 8+8 ?", a: ["12", "16", "24", "32"] },
        { q: "Complétez la suite : 2, 4, 8, 16, ...", a: ["24", "30", "32", "64"] },
        { q: "Le frère de ma sœur est le fils de mon père. Qui est-il ?", a: ["Mon oncle", "Mon cousin", "Mon frère", "Moi-même"] },
        { q: "Quelle ville est l'intrus ?", a: ["Paris", "Lyon", "Berlin", "Marseille"] }
    ];

    let currentQ = 0;

    function toggleMute() {
        music.muted = !music.muted;
        document.getElementById('mute-btn').innerText = music.muted ? "ⱽ" : "🔊";
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('global-timer').innerText = `Temps restant : ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) finishQuiz();
        }, 1000);
    }

    function startQuiz() {
        music.play();
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        startTimer();
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => nextQuestion();
            optionsDiv.appendChild(btn);
        });
        document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        clearInterval(timerId);
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('global-timer').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        setTimeout(() => {
            // METS TON LIEN BEACONS ICI :
            window.location.href = "https://beacons.ai/TON_PSEUDO";
        }, 3500);
    }
</script>

</body>
</html>
